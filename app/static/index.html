<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AI API Proxy</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #080c14;
      --surface:   #0e1420;
      --surface2:  #131c2e;
      --border:    rgba(148,163,184,.1);
      --border2:   rgba(148,163,184,.18);
      --text:      #e2e8f0;
      --muted:     #64748b;
      --blue:      #3b82f6;
      --blue-dim:  rgba(59,130,246,.12);
      --green:     #10b981;
      --green-dim: rgba(16,185,129,.12);
      --red:       #f43f5e;
      --red-dim:   rgba(244,63,94,.12);
      --yellow:    #f59e0b;
      --radius:    10px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      font-size: 14px;
      line-height: 1.5;
    }

    .header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      height: 54px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky; top: 0; z-index: 100;
    }
    .logo-row { display: flex; align-items: center; gap: 10px; }
    .logo {
      width: 28px; height: 28px;
      background: linear-gradient(135deg, #3b82f6, #8b5cf6);
      border-radius: 7px;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px;
    }
    .header-title { font-weight: 600; font-size: 15px; }
    .header-right { display: flex; align-items: center; gap: 10px; }
    .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--muted); flex-shrink: 0; }
    .dot.ok  { background: var(--green); box-shadow: 0 0 6px var(--green); }
    .dot.bad { background: var(--red);   box-shadow: 0 0 6px var(--red); }
    .status-label { font-size: 12px; color: var(--muted); }

    .token-bar {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 10px 24px;
      display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
    }
    .bar-label { font-size: 12px; color: var(--muted); white-space: nowrap; }

    .main { padding: 20px 24px; max-width: 1200px; margin: 0 auto; }

    .stats { display: flex; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; }
    .stat {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 14px 20px;
      display: flex; align-items: center; gap: 12px; flex: 1; min-width: 130px;
    }
    .stat-icon {
      width: 36px; height: 36px; border-radius: 8px;
      display: flex; align-items: center; justify-content: center; font-size: 16px;
    }
    .stat-icon.g { background: var(--green-dim); }
    .stat-icon.r { background: var(--red-dim); }
    .stat-num { font-size: 26px; font-weight: 700; line-height: 1; }
    .stat-num.g { color: var(--green); }
    .stat-num.r { color: var(--red); }
    .stat-sub { font-size: 11px; color: var(--muted); margin-top: 2px; }

    .sec { margin-bottom: 20px; }
    .sec-head { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
    .sec-title { font-weight: 600; font-size: 13px; text-transform: uppercase; letter-spacing: .5px; }
    .pill {
      font-size: 11px; font-weight: 600; padding: 1px 8px;
      border-radius: 20px; line-height: 1.7;
    }
    .pill.g { background: var(--green-dim); color: var(--green); }
    .pill.r { background: var(--red-dim);   color: var(--red); }

    .tcard {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); overflow: hidden;
    }
    .tscroll { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; }
    thead th {
      padding: 9px 14px; text-align: left;
      font-size: 11px; font-weight: 600; color: var(--muted);
      text-transform: uppercase; letter-spacing: .5px;
      background: var(--surface2); border-bottom: 1px solid var(--border);
      white-space: nowrap;
    }
    tbody td {
      padding: 10px 14px; font-size: 13px;
      border-bottom: 1px solid var(--border); vertical-align: middle;
    }
    tbody tr:last-child td { border-bottom: none; }
    tbody tr:hover { background: rgba(255,255,255,.02); }
    .url-cell {
      font-family: 'SF Mono', 'Fira Code', monospace; font-size: 12px;
      color: #93c5fd; max-width: 360px;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .num  { color: var(--muted); }
    .dt   { font-size: 12px; color: var(--muted); white-space: nowrap; }
    .err  {
      color: var(--red); font-size: 12px;
      max-width: 280px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .empty td { text-align: center; padding: 32px; color: var(--muted); }

    .add-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); overflow: hidden;
    }
    .add-head {
      padding: 12px 16px; border-bottom: 1px solid var(--border);
      background: var(--surface2);
      display: flex; align-items: center; gap: 8px;
      cursor: pointer; user-select: none;
    }
    .add-head-title { font-weight: 600; font-size: 13px; flex: 1; }
    .chevron { color: var(--muted); font-size: 11px; transition: transform .2s; }
    .chevron.open { transform: rotate(180deg); }
    .add-body { padding: 16px; display: none; }
    .add-body.open { display: block; }

    .field { margin-bottom: 10px; }
    .field label { display: block; font-size: 11px; color: var(--muted); margin-bottom: 4px; font-weight: 500; }

    input[type=text], input[type=password], textarea {
      width: 100%; padding: 8px 11px;
      background: var(--bg); border: 1px solid var(--border2);
      border-radius: 7px; color: var(--text); font-size: 13px;
      font-family: inherit; outline: none; transition: border-color .15s;
    }
    input:focus, textarea:focus { border-color: var(--blue); }
    textarea { min-height: 90px; resize: vertical; }

    .btn {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 7px 14px; border-radius: 7px; border: none;
      cursor: pointer; font-size: 13px; font-weight: 500; font-family: inherit;
      transition: opacity .15s, transform .1s;
    }
    .btn:active { transform: scale(.97); }
    .btn:hover  { opacity: .85; }
    .btn-primary { background: var(--blue); color: #fff; }
    .btn-ghost { background: transparent; border: 1px solid var(--border2); color: var(--text); }
    .btn-sm { padding: 6px 11px; font-size: 12px; }

    .toast {
      font-size: 12px; margin-top: 9px; padding: 7px 11px;
      border-radius: 6px; display: none;
    }
    .toast.ok  { background: var(--green-dim); color: var(--green); display: block; }
    .toast.bad { background: var(--red-dim);   color: var(--red);   display: block; }
  </style>
</head>
<body>

<header class="header">
  <div class="logo-row">
    <div class="logo">⚡</div>
    <span class="header-title">AI API Proxy</span>
  </div>
  <div class="header-right">
    <span class="dot" id="dot"></span>
    <span class="status-label" id="statusLbl">—</span>
  </div>
</header>

<div class="token-bar">
  <span class="bar-label">Admin Token</span>
  <input type="password" id="tokenInput" style="max-width:200px" autocomplete="off" />
  <button class="btn btn-ghost btn-sm" id="btnSave">保存</button>
  <button class="btn btn-ghost btn-sm" id="btnRefresh" title="刷新池状态">⟳ 刷新状态</button>
  <span class="bar-label" style="margin-left:8px">同步文件路径</span>
  <input type="text" id="syncFilePath" placeholder="/app/data/urls.txt" style="max-width:240px" autocomplete="off" />
  <button class="btn btn-ghost btn-sm" id="btnSyncFile" title="读取指定文件并导入 URL">📂 同步文件 URL</button>
  <span id="syncToast" style="font-size:12px;padding:4px 10px;border-radius:6px;display:none"></span>
</div>

<div class="main">

  <div class="stats">
    <div class="stat">
      <div class="stat-icon g">🟢</div>
      <div>
        <div class="stat-num g" id="numAlive">—</div>
        <div class="stat-sub">存活池 URL</div>
      </div>
    </div>
    <div class="stat">
      <div class="stat-icon r">🔴</div>
      <div>
        <div class="stat-num r" id="numRevival">—</div>
        <div class="stat-sub">复活池 URL</div>
      </div>
    </div>
  </div>

  <!-- Add URLs -->
  <div class="sec">
    <div class="add-card">
      <div class="add-head" id="addToggle">
        <span class="add-head-title">＋ 添加 URL</span>
        <span class="chevron" id="addChevron">▼</span>
      </div>
      <div class="add-body" id="addBody">
        <div class="field">
          <label>URL 列表（每行一个，可不带 /api，后端自动补全）</label>
          <textarea id="addUrls" placeholder="https://repli--xxx.replit.app&#10;https://api-2.example.com"></textarea>
        </div>
        <button class="btn btn-primary" id="btnAdd">提交</button>
        <div class="toast" id="addToast"></div>
      </div>
    </div>
  </div>

  <!-- Alive pool -->
  <div class="sec">
    <div class="sec-head">
      <span style="display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--green);box-shadow:0 0 7px var(--green)"></span>
      <span class="sec-title" style="color:var(--green)">存活池</span>
      <span class="pill g" id="cntAlive">0</span>
      <span style="font-size:11px;color:var(--muted);margin-left:4px">每个 URL 调用 3 次后自动健康检测，失败则移入复活池</span>
    </div>
    <div class="tcard">
      <div class="tscroll">
        <table>
          <thead>
            <tr>
              <th>URL</th>
              <th>调用次数</th>
              <th>添加时间</th>
              <th>最近检测</th>
            </tr>
          </thead>
          <tbody id="tbAlive">
            <tr class="empty"><td colspan="4">暂无数据</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- Revival pool -->
  <div class="sec">
    <div class="sec-head">
      <span style="display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--red);box-shadow:0 0 7px var(--red)"></span>
      <span class="sec-title" style="color:var(--red)">复活池</span>
      <span class="pill r" id="cntRevival">0</span>
      <span style="font-size:11px;color:var(--muted);margin-left:4px">添加满 31 天后自动探活，成功则回到存活池</span>
    </div>
    <div class="tcard">
      <div class="tscroll">
        <table>
          <thead>
            <tr>
              <th>URL</th>
              <th>移入原因</th>
              <th>添加时间</th>
              <th>可探活时间</th>
            </tr>
          </thead>
          <tbody id="tbRevival">
            <tr class="empty"><td colspan="4">暂无数据</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

</div>

<script>
  const STORE_KEY      = "proxy_admin_token";
  const STORE_FILE_KEY = "proxy_sync_file_path";

  const $ = id => document.getElementById(id);
  const tokenInput   = $("tokenInput");
  const syncFilePath = $("syncFilePath");

  tokenInput.value   = localStorage.getItem(STORE_KEY)      || "";
  syncFilePath.value = localStorage.getItem(STORE_FILE_KEY) || "";

  syncFilePath.addEventListener("change", () => {
    localStorage.setItem(STORE_FILE_KEY, syncFilePath.value.trim());
  });

  function tok() { return tokenInput.value.trim(); }
  function hdrs() {
    return { "Authorization": `Bearer ${tok()}`, "Content-Type": "application/json" };
  }
  function esc(v) {
    return (v ?? "—").toString().replace(/</g, "&lt;").replace(/>/g, "&gt;");
  }
  function fmtDate(v) {
    if (!v) return "—";
    try {
      const s = v.includes("Z") || v.includes("+") ? v : v + "Z";
      return new Date(s).toLocaleString("zh-CN", {
        month: "2-digit", day: "2-digit",
        hour: "2-digit", minute: "2-digit", second: "2-digit"
      });
    } catch { return v; }
  }
  function etaDays(addedAt) {
    if (!addedAt) return "—";
    try {
      const s   = addedAt.includes("Z") || addedAt.includes("+") ? addedAt : addedAt + "Z";
      const eta = new Date(new Date(s).getTime() + 31 * 86400 * 1000);
      const ms  = eta - Date.now();
      if (ms <= 0) return `<span style="color:var(--yellow);font-weight:600">可探活</span>`;
      const d = Math.ceil(ms / 86400000);
      return `<span style="color:var(--muted)">约 ${d} 天后（${fmtDate(eta.toISOString())}）</span>`;
    } catch { return "—"; }
  }

  function setStatus(ok, msg) {
    $("dot").className        = `dot ${ok ? "ok" : "bad"}`;
    $("statusLbl").textContent = msg;
  }

  async function load() {
    if (!tok()) { setStatus(false, "请先输入 Token"); return; }
    try {
      const r = await fetch("/admin/urls", { headers: hdrs() });
      if (!r.ok) throw new Error(`HTTP ${r.status}`);
      const endpoints = await r.json();

      const alive   = endpoints.filter(e => e.pool === "alive");
      const revival = endpoints.filter(e => e.pool === "revival");

      $("numAlive").textContent   = alive.length;
      $("numRevival").textContent = revival.length;
      $("cntAlive").textContent   = alive.length;
      $("cntRevival").textContent = revival.length;

      $("tbAlive").innerHTML = alive.length
        ? alive.map(e => `<tr>
            <td class="url-cell" title="${esc(e.base_url)}">${esc(e.base_url)}</td>
            <td class="num">${e.call_count}</td>
            <td class="dt">${fmtDate(e.added_at)}</td>
            <td class="dt">${fmtDate(e.last_checked_at)}</td>
          </tr>`).join("")
        : `<tr class="empty"><td colspan="4">存活池暂无 URL</td></tr>`;

      $("tbRevival").innerHTML = revival.length
        ? revival.map(e => `<tr>
            <td class="url-cell" title="${esc(e.base_url)}">${esc(e.base_url)}</td>
            <td class="err" title="${esc(e.last_error)}">${esc(e.last_error)}</td>
            <td class="dt">${fmtDate(e.added_at)}</td>
            <td>${etaDays(e.added_at)}</td>
          </tr>`).join("")
        : `<tr class="empty"><td colspan="4">复活池暂无 URL</td></tr>`;

      setStatus(true, "已连接");
    } catch (err) {
      setStatus(false, `错误: ${err.message}`);
    }
  }

  // Add URLs
  $("addToggle").addEventListener("click", () => {
    const open = $("addBody").classList.toggle("open");
    $("addChevron").classList.toggle("open", open);
  });

  $("btnAdd").addEventListener("click", async () => {
    const toast = $("addToast");
    const urls  = $("addUrls").value.split("\n").map(s => s.trim()).filter(Boolean);
    if (!urls.length) { show(toast, "bad", "请输入至少一个 URL"); return; }
    show(toast, "", "提交中…");
    try {
      const r = await fetch("/admin/urls", {
        method: "POST", headers: hdrs(), body: JSON.stringify({ urls }),
      });
      const d = await r.json().catch(() => ({}));
      if (!r.ok) throw new Error(d.detail || `status ${r.status}`);
      show(toast, "ok", `✓ 新增 ${d.inserted_urls} 个 URL`);
      $("addUrls").value = "";
      await load();
    } catch (err) {
      show(toast, "bad", `失败: ${err.message}`);
    }
  });

  // Sync file
  $("btnSyncFile").addEventListener("click", async () => {
    const toast    = $("syncToast");
    const filePath = syncFilePath.value.trim();
    localStorage.setItem(STORE_FILE_KEY, filePath);
    toast.textContent = "同步中…";
    toast.style.display   = "inline-block";
    toast.style.background = "rgba(148,163,184,.12)";
    toast.style.color      = "#94a3b8";
    try {
      const r = await fetch("/admin/url-sync/run", {
        method: "POST", headers: hdrs(),
        body: JSON.stringify({ file: filePath || null }),
      });
      const d = await r.json().catch(() => ({}));
      if (!r.ok) {
        toast.textContent  = `✗ ${d.detail || `HTTP ${r.status}`}`;
        toast.style.background = "rgba(244,63,94,.12)";
        toast.style.color      = "#f43f5e";
      } else {
        toast.textContent  = `✓ 新增 ${d.inserted_urls} 个 URL`;
        toast.style.background = "rgba(16,185,129,.12)";
        toast.style.color      = "#10b981";
        await load();
      }
    } catch (err) {
      toast.textContent  = `✗ ${err.message}`;
      toast.style.background = "rgba(244,63,94,.12)";
      toast.style.color      = "#f43f5e";
    }
    setTimeout(() => { toast.style.display = "none"; }, 4000);
  });

  function show(el, cls, txt) {
    el.textContent = txt;
    el.className   = cls ? `toast ${cls}` : "toast";
    if (!cls) el.style.display = "block";
  }

  $("btnSave").addEventListener("click", () => {
    localStorage.setItem(STORE_KEY, tok());
    load();
  });
  $("btnRefresh").addEventListener("click", load);

  load();
</script>
</body>
</html>
